<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="基于 Markdown 的静态知识库，支持亮/暗色主题与树状目录导航" />
  <title>Mindustry Logic Script Wiki</title>

  <!-- 样式 -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/markdown.css" />

  <!-- marked.js（Markdown 解析，CDN 加载） -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body>

  <!-- =============================================
       顶栏
       ============================================= -->
  <header class="topbar" role="banner">

    <!-- 移动端菜单按钮 -->
    <button class="btn-icon" id="mobile-menu-btn" aria-label="打开导航菜单" style="display:none;">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <!-- Logo -->
    <a class="topbar__logo" href="#" aria-label="回到首页">
      <span class="topbar__logo-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" id="logo-svg" stroke="white" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </span>
      <span id="site-title">MLS Wiki</span>
    </a>

    <!-- 搜索 -->
    <div class="topbar__search" role="search">
      <span class="topbar__search-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
      </span>
      <input
        id="search-input"
        class="topbar__search-input"
        type="search"
        placeholder="搜索文档…"
        autocomplete="off"
        spellcheck="false"
        aria-label="搜索文档"
        aria-autocomplete="list"
        aria-controls="search-dropdown"
      />
      <div id="search-dropdown" class="search-dropdown" role="listbox" aria-label="搜索结果"></div>
    </div>

    <!-- 右侧操作 -->
    <div class="topbar__actions">
      <!-- 主题切换 -->
      <button class="btn-icon" id="theme-toggle" aria-label="切换主题">
        <span class="icon-moon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </span>
        <span class="icon-sun" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
        </span>
      </button>

      <!-- GitHub 链接 -->
      <a class="btn-icon" href="https://github.com" target="_blank" rel="noopener" aria-label="GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- =============================================
       移动端侧边栏遮罩（由 is-visible class 控制）
       ============================================= -->
  <div id="sidebar-overlay"></div>

  <!-- =============================================
       TOC 抽屉遮罩（窄屏展开 TOC 时显示，z-index 79）
       ============================================= -->
  <div id="toc-overlay"></div>

  <!-- =============================================
       主体
       ============================================= -->
  <div class="app">

    <!-- 侧边栏 -->
    <nav id="sidebar" class="sidebar" aria-label="文档导航">
      <div class="sidebar__inner">
        <div id="tree-nav" role="tree" aria-label="文档目录"></div>
      </div>
    </nav>

    <!-- 侧边栏收起/展开按钮 -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="收起/展开侧边栏">
      <span class="icon-chevron-left">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </span>
      <span class="icon-chevron-right" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </span>
    </button>

    <!-- 内容 + TOC -->
    <main id="main" class="main" role="main">

      <!-- 文章区 -->
      <article class="content" id="content-area">
        <!-- 面包屑 -->
        <nav class="breadcrumb" id="breadcrumb" aria-label="面包屑导航"></nav>

        <!-- Markdown 渲染区 -->
        <div class="md-content" id="md-content">
          <!-- 内容由 JS 动态注入 -->
        </div>
      </article>

      <!-- 页内 TOC（桌面端内联；窄屏固定在右下角） -->
      <aside class="toc-panel" id="toc-panel" aria-label="页内目录">
        <!-- 收起/展开触发按钮（所有断点下始终可见） -->
        <button class="toc-toggle" id="toc-toggle" aria-label="收起/展开本页目录">
          <!-- 展开态图标：箭头朝右，提示"可收起" -->
          <span class="icon-toc-close">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
          </span>
          <!-- 折叠态图标：箭头朝左，提示"可展开" -->
          <span class="icon-toc-open" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
          </span>
        </button>
        <!-- TOC 内容 -->
        <div class="toc-body">
          <div class="toc-sticky">
            <p class="toc-title">本页目录</p>
            <ul class="toc-nav" id="toc-nav"></ul>
          </div>
        </div>
      </aside>

    </main>
  </div>

  <!-- JS 模块（顺序很重要：config → markdown → search → app） -->
  <script src="js/config.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>

  <!-- 移动端响应式小脚本 -->
  <script>
    (function () {
      function checkMobile() {
        const isMobile = window.innerWidth <= 768;
        const btn = document.getElementById("mobile-menu-btn");
        if (btn) btn.style.display = isMobile ? "flex" : "none";
        // 切换到桌面端时强制关闭移动端侧边栏与遮罩
        if (!isMobile) {
          document.getElementById("sidebar")?.classList.remove("is-mobile-open");
          document.getElementById("sidebar-overlay")?.classList.remove("is-visible");
        }
      }
      window.addEventListener("resize", checkMobile);
      checkMobile();
    })();
  </script>

</body>
</html>
